name: Build test
on:
  push:
    branches:
      - develop
      - master
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
  workflow_dispatch:
  workflow_call:

# Serialize every build-test run repo-wide. Each run logs into the shared
# IB paper account, and IB Gateway permits a single login session per
# account. The group is a constant (NOT ${{ github.ref }}-scoped) so runs
# from different branches/PRs — and deploy.yml's workflow_call — all queue
# behind one another instead of logging in concurrently.
# cancel-in-progress: false queues runs rather than cancelling them, so an
# unrelated PR's in-flight run is never killed. Trade-off: a superseded run
# on the SAME ref now runs to completion before the next dequeues, instead
# of being cancelled immediately.
concurrency:
  group: ib-paper-account-build-test
  cancel-in-progress: false

env:
  # Opt every JavaScript-based action into Node.js 24. Node 20 is deprecated
  # on GitHub-hosted runners and will be removed on 2026-09-16; without this
  # the next runner upgrade silently fails any action still on Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    # Build and run the full functional suite natively on each architecture.
    # The matrix value only selects the runner; each build targets the
    # runner's native arch, so no QEMU emulation is involved.
    # max-parallel: 1 serializes the arch legs — every functional step logs
    # into the same IB paper account, and IB Gateway allows only one active
    # session per account, so the legs must not run concurrently.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 25
    env:
      IMAGE_NAME: ib-gateway-docker
    steps:
    - uses: actions/checkout@v4
    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ env.IMAGE_NAME }}
    - name: Verify healthcheck inside container
      run: |
        CONTAINER_ID=$(docker run \
          -e IB_ACCOUNT=$IB_ACCOUNT \
          -e IB_PASSWORD=$IB_PASSWORD \
          -e TRADING_MODE=paper \
          -d $IMAGE_NAME)
        echo "Container started: $CONTAINER_ID"
        # Log IB Gateway off its IBKR session, then drop the container — in
        # that order, so the shared paper-account session is released for
        # the next step instead of lingering on a hard-killed container.
        teardown() {
          scripts/ci/graceful-stop.sh docker "$CONTAINER_ID" || true
          timeout 90 docker wait "$CONTAINER_ID" >/dev/null 2>&1 || true
          docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true
        }
        # Wait for IB Gateway to be ready (poll healthcheck with retries)
        for i in $(seq 1 12); do
          echo "Healthcheck attempt $i/12..."
          if docker exec $CONTAINER_ID healthcheck 2>/dev/null; then
            echo "Healthcheck passed"
            teardown
            exit 0
          fi
          sleep 10
        done
        echo "Healthcheck failed after 120 seconds"
        docker logs $CONTAINER_ID
        teardown
        exit 1
      env:
        IB_ACCOUNT: ${{ secrets.IB_ACCOUNT }}
        IB_PASSWORD: ${{ secrets.IB_PASSWORD }}

    - name: Smoke tests container image
      run: pytest -x
      env:
        IB_ACCOUNT: ${{ secrets.IB_ACCOUNT }}
        IB_PASSWORD: ${{ secrets.IB_PASSWORD }}
        TRADING_MODE: paper

    - name: Run ib_insync example
      run: |
        CONTAINER_ID=$(docker run \
          -e IB_ACCOUNT=$IB_ACCOUNT \
          -e IB_PASSWORD=$IB_PASSWORD \
          -e TRADING_MODE=paper \
          -p 4002:4002 \
          -d \
          $IMAGE_NAME)
        sleep 30
        pip install ib_insync pandas
        python examples/ib_insync/scripts/connect_gateway.py
        # Log the gateway off IB cleanly before removing the container, so
        # the session does not linger into the next matrix leg.
        scripts/ci/graceful-stop.sh docker "$CONTAINER_ID" || true
        timeout 90 docker wait "$CONTAINER_ID" >/dev/null 2>&1 || true
        docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true
      env:
        IB_ACCOUNT: ${{ secrets.IB_ACCOUNT }}
        IB_PASSWORD: ${{ secrets.IB_PASSWORD }}
        TRADING_MODE: paper

    # ── k8s: stand up a k3d cluster, deploy examples/k8s/single.yaml,
    # and confirm the pod reaches Ready (which transitively confirms the
    # /healthcheck/bin/healthcheck probe passes — same contract as the
    # docker-exec healthcheck step above, but exercising the StatefulSet,
    # Secret, PVC, and seed-jts initContainer wiring).
    - name: Set up k3d
      run: |
        # Pinned to the v5.7.5 install.sh by commit SHA — protects against
        # main-branch compromise of the script even though TAG is also
        # pinned below. -f makes curl fail on HTTP errors instead of piping
        # an empty body to bash; -L follows the GitHub raw redirect.
        curl -fsSL \
          "https://raw.githubusercontent.com/k3d-io/k3d/b1c64bcb459e266b92ff1d0820a62a6541b1efb5/install.sh" \
          | TAG=v5.7.5 bash
        # kubectl ships preinstalled on GitHub-hosted ubuntu-latest, but not
        # in the lightweight `act` runner image. Install it when missing so
        # the workflow runs identically under local `act`.
        if ! command -v kubectl >/dev/null 2>&1; then
          ver="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSL -o /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/${ver}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl
        fi
        k3d version
        kubectl version --client

    - name: Create k3d cluster
      run: |
        k3d cluster create ib-gateway-ci \
          --no-lb --servers 1 --agents 0 --wait

    - name: Import image into k3d
      run: k3d image import "$IMAGE_NAME" -c ib-gateway-ci

    - name: Apply manifests with real credentials
      run: |
        # Create the namespace + real Secret BEFORE the StatefulSet so the
        # first pod boots with valid credentials. The old flow applied a
        # REPLACE_ME Secret then `rollout restart` to pick up real creds —
        # but that restart's old-pod teardown (terminationGracePeriodSeconds
        # 120 + volume detach) can eat 4+ min and blow the rollout timeout.
        # Seeding creds up front means a single fresh pod, no restart.
        kubectl create namespace ib-gateway \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl -n ib-gateway create secret generic ib-gateway \
          --from-literal=IB_ACCOUNT="$IB_ACCOUNT" \
          --from-literal=IB_PASSWORD="$IB_PASSWORD" \
          --dry-run=client -o yaml | kubectl apply -f -
        # Apply Service + StatefulSet with the local CI image, dropping the
        # manifest's placeholder Secret doc so it can't clobber the real one.
        python3 -c '
        docs = open("examples/k8s/single.yaml").read().split("\n---\n")
        print("\n---\n".join(d for d in docs if "kind: Secret" not in d))
        ' | sed -E "s|image: manhinhang/ib-gateway-docker:latest|image: ${IMAGE_NAME}|g" \
          | kubectl apply -f -
      env:
        IB_ACCOUNT: ${{ secrets.IB_ACCOUNT }}
        IB_PASSWORD: ${{ secrets.IB_PASSWORD }}

    - name: Wait for rollout to complete
      run: |
        # One fresh pod, no rollout-restart teardown: seed-jts initContainer
        # (~10-30s) + 60s readiness initial delay + ~30-60s IB Gateway login.
        # 420s leaves comfortable margin for slow runners. rollout status
        # requires every replica to satisfy the readiness probe — same
        # /healthcheck/bin/healthcheck binary the docker test uses — so it
        # doubles as the healthcheck gate for the k8s wiring.
        kubectl -n ib-gateway rollout status statefulset/ib-gateway --timeout=420s

    - name: Dump k8s diagnostics on failure
      if: failure()
      run: |
        kubectl -n ib-gateway get all -o wide || true
        kubectl -n ib-gateway describe pod ib-gateway-0 || true
        kubectl -n ib-gateway logs ib-gateway-0 -c seed-jts --tail=50 || true
        kubectl -n ib-gateway logs ib-gateway-0 --tail=200 || true

    - name: Gracefully stop the IB Gateway pod
      if: always()
      run: |
        # Log the pod's IB Gateway off its IBKR session BEFORE k3d nukes the
        # node — `k3d cluster delete` hard-kills the pod, leaving the shared
        # paper-account session lingering for the next matrix leg. Delete the
        # StatefulSet first (--wait=false) so it can't recreate the pod
        # mid-teardown; the pod then has its 120s grace window, during which
        # IBC STOP triggers a clean File>Exit logoff. All steps are
        # best-effort: when an earlier failure skipped the k8s steps there is
        # no cluster, and every command here is guarded with `|| true`.
        kubectl -n ib-gateway delete statefulset ib-gateway --wait=false 2>/dev/null || true
        scripts/ci/graceful-stop.sh k8s ib-gateway-0 || true
        kubectl -n ib-gateway wait --for=delete pod/ib-gateway-0 --timeout=120s 2>/dev/null || true

    - name: Tear down k3d cluster
      if: always()
      run: k3d cluster delete ib-gateway-ci || true

    - name: Stop and remove leftover containers
      if: always()
      run: |
        leftovers=$(docker ps -aq)
        if [ -n "$leftovers" ]; then
          # Best-effort clean IB logoff before force-removal, so a failed
          # step does not leave a half-open session for the next leg.
          for c in $leftovers; do
            scripts/ci/graceful-stop.sh docker "$c" || true
          done
          docker rm -f $leftovers
        fi

    - name: Cooldown so IB releases the account session before the next arch leg
      if: always()
      run: |
        # max-parallel:1 holds the next matrix leg until this job finishes.
        # Even after a clean IBC STOP, give IB's account server a moment to
        # mark the session free; this also covers a failed leg that never
        # logged off cleanly.
        sleep 120

