name: Detect new version
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  # Opt JS-based actions into Node 24; Node 20 is deprecated and will be
  # removed from runners on 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: write
    env:
      IMAGE_NAME: ib-gateway-docker
      IBC_VERSION_JSON_URL: "https://api.github.com/repos/IbcAlpha/IBC/releases"
    steps:
    - uses: actions/checkout@v4
    - name: detect new versions
      id: check-update
      run: |
        # version.json is JSONP (callback-wrapped); strip the wrapper, then jq.
        strip_jsonp() { sed -E 's/^[^(]+\(//; s/\);[[:space:]]*$//'; }
        IB_GATEWAY_LATEST_VER=$(curl -fsSL "https://download2.interactivebrokers.com/installers/ibgateway/latest-standalone/version.json" | strip_jsonp | jq -r '.buildVersion')
        IB_GATEWAY_STABLE_VER=$(curl -fsSL "https://download2.interactivebrokers.com/installers/ibgateway/stable-standalone/version.json" | strip_jsonp | jq -r '.buildVersion')
        IBC_VER=$(curl -fsSL "${IBC_VERSION_JSON_URL}" | jq -r '.[0].name')
        source versions.env

        HAS_UPDATE='false'
        if [ "$IB_GATEWAY_LATEST_VER" != "$CUR_IB_GATEWAY_LATEST_VER" ]; then
            echo "New IB Gateway latest version($IB_GATEWAY_LATEST_VER)"
            HAS_UPDATE='true'
        fi
        if [ "$IB_GATEWAY_STABLE_VER" != "$CUR_IB_GATEWAY_STABLE_VER" ]; then
            echo "New IB Gateway stable version($IB_GATEWAY_STABLE_VER)"
            HAS_UPDATE='true'
        fi
        if [ "$IBC_VER" != "$CUR_IBC_VER" ]; then
            echo "New IBC version($IBC_VER)"
            HAS_UPDATE='true'
        fi

        if [ "$HAS_UPDATE" = 'false' ]; then
            echo "No new versions available"
        fi

        echo "has_update=$HAS_UPDATE" >> "$GITHUB_OUTPUT"
        echo "ib-gateway-latest-ver=$IB_GATEWAY_LATEST_VER" >> "$GITHUB_OUTPUT"
        echo "ib-gateway-stable-ver=$IB_GATEWAY_STABLE_VER" >> "$GITHUB_OUTPUT"
        echo "ibc-ver=$IBC_VER" >> "$GITHUB_OUTPUT"
    - name: Update files with new version
      if: steps.check-update.outputs.has_update == 'true'
      run: |
        # Use '|' as the sed separator so version strings containing '/' or '&'
        # don't break the substitution.
        sed -e "s|###IB_GATEWAY_LATEST_VER###|${{steps.check-update.outputs.ib-gateway-latest-ver}}|" \
            -e "s|###IB_GATEWAY_STABLE_VER###|${{steps.check-update.outputs.ib-gateway-stable-ver}}|" \
            -e "s|###IBC_VER###|${{steps.check-update.outputs.ibc-ver}}|" README.template > README.md
    - name: Create PR
      if: ${{ steps.check-update.outputs.has_update == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        branch='feat/update-latest-${{ steps.check-update.outputs.ib-gateway-latest-ver }}-stable-${{ steps.check-update.outputs.ib-gateway-stable-ver }}-ibc${{steps.check-update.outputs.ibc-ver}}'

        # 检查并关闭已存在的PR
        existing_pr=$(gh pr list --search "head:$branch" --json number --jq '.[0].number')
        if [ ! -z "$existing_pr" ]; then
          gh pr close $existing_pr
        fi

        # 检查并删除已存在的分支
        if git ls-remote --heads origin "$branch" | grep -q "$branch"; then
          git push origin --delete "$branch"
        fi

        git config user.name github-actions
        git config user.email github-actions@github.com
        git config advice.addIgnoredFile false
        git stash push README.md
        git pull
        git checkout -b "$branch" origin/master
        # Update files
        git stash pop stash@{0}
        echo "CUR_IB_GATEWAY_LATEST_VER=${{ steps.check-update.outputs.ib-gateway-latest-ver }}" > versions.env
        echo "CUR_IB_GATEWAY_STABLE_VER=${{ steps.check-update.outputs.ib-gateway-stable-ver }}" >> versions.env
        echo "CUR_IBC_VER=${{ steps.check-update.outputs.ibc-ver }}" >> versions.env
        #####
        git add README.md
        git add versions.env
        git commit -m 'Update to latest `${{ steps.check-update.outputs.ib-gateway-latest-ver }}` stable `${{ steps.check-update.outputs.ib-gateway-stable-ver }}`'
        git push --set-upstream origin "$branch"

        gh pr create --base master --fill

        # PRs opened with GITHUB_TOKEN do NOT trigger on:pull_request workflows
        # (GitHub anti-recursion). workflow_dispatch is exempt from that
        # suppression, so kick build-test explicitly against the new branch;
        # its check runs land on the PR's head commit and satisfy branch
        # protection.
        gh workflow run build-test.yml --ref "$branch"
