name: "Publish Docker"

on:
   push:
     branches:
       - master
     tags:
       - '*'
   workflow_dispatch:

env:
  # Opt JS-based actions into Node 24; Node 20 is deprecated and will be
  # removed from runners on 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      matrix:
        channel: [stable, latest]
        registry:
          # Dockerhub
          - images: manhinhang/ib-gateway-docker
            username: DOCKERHUB_USERNAME
            password: DOCKERHUB_PASSWORD
            url: ''
          # Github
          - images: ghcr.io/manhinhang/ib-gateway-docker
            username: ${{ github.actor }}
            password: GITHUB_TOKEN
            url: 'ghcr.io'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.registry.images }}
          tags: |
            type=raw,value=${{ matrix.channel }}
            type=raw,value=${{ matrix.channel }}-{{date 'YYYYMMDD'}},enable={{is_default_branch}}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.registry.url }}
          username: ${{ matrix.registry.url == 'ghcr.io' && matrix.registry.username || secrets[matrix.registry.username] }}
          password: ${{ secrets[matrix.registry.password] }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: CHANNEL=${{ matrix.channel }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
