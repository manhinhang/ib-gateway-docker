name: "Publish Docker"

on:
   push:
     branches:
       - master
     tags:
       - '*'
   workflow_dispatch:

env:
  # Opt JS-based actions into Node 24; Node 20 is deprecated and will be
  # removed from runners on 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    uses: ./.github/workflows/build-test.yml
    secrets: inherit

  # Build each architecture natively on its own runner and push the image by
  # digest. The merge job below assembles the per-arch digests into one
  # multi-arch manifest. Native builds avoid slow QEMU emulation.
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, latest]
        platform: [linux/amd64, linux/arm64]
        registry:
          # Dockerhub
          - images: manhinhang/ib-gateway-docker
            username: DOCKERHUB_USERNAME
            password: DOCKERHUB_PASSWORD
            url: ''
            key: dockerhub
          # Github
          - images: ghcr.io/manhinhang/ib-gateway-docker
            username: ${{ github.actor }}
            password: GITHUB_TOKEN
            url: 'ghcr.io'
            key: ghcr
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Prepare
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.registry.url }}
          username: ${{ matrix.registry.url == 'ghcr.io' && matrix.registry.username || secrets[matrix.registry.username] }}
          password: ${{ secrets[matrix.registry.password] }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: CHANNEL=${{ matrix.channel }}
          outputs: type=image,name=${{ matrix.registry.images }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.channel }}-${{ matrix.registry.key }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests pushed above into a single multi-arch
  # manifest, tagged the same way the old single-platform build tagged it.
  merge:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, latest]
        registry:
          - images: manhinhang/ib-gateway-docker
            username: DOCKERHUB_USERNAME
            password: DOCKERHUB_PASSWORD
            url: ''
            key: dockerhub
          - images: ghcr.io/manhinhang/ib-gateway-docker
            username: ${{ github.actor }}
            password: GITHUB_TOKEN
            url: 'ghcr.io'
            key: ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.channel }}-${{ matrix.registry.key }}-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.registry.url }}
          username: ${{ matrix.registry.url == 'ghcr.io' && matrix.registry.username || secrets[matrix.registry.username] }}
          password: ${{ secrets[matrix.registry.password] }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.registry.images }}
          tags: |
            type=raw,value=${{ matrix.channel }}
            type=raw,value=${{ matrix.channel }}-{{date 'YYYYMMDD'}},enable={{is_default_branch}}
      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.registry.images }}@sha256:%s ' *)
      - name: Inspect image
        run: docker buildx imagetools inspect ${{ matrix.registry.images }}:${{ matrix.channel }}
